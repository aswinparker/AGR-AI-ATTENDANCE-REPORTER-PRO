<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGR AI Labour Attendance Pro v4 Firebase</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
header,footer{background:#0b2545;color:#fff;text-align:center;padding:15px}
h1{color:#d4af37}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,select,button{width:100%;padding:10px;margin:5px 0;box-sizing:border-box}
button{background:#0b2545;color:#fff;border:none;border-radius:6px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#0b2545;color:#fff}
</style>
</head>
<body>
<header><h1>AGR AI Labour Attendance Pro v4 Firebase</h1></header>
<div class="container">
<div class="card">
<input id="enteredBy" placeholder="Entered By">
<input id="project" placeholder="Project Name">
<input id="date" type="date">
</div>

<div class="card">
<table id="labourTable">
<tr><th>ID</th><th>Name</th><th>Category</th><th>Present</th></tr>
</table>
<button onclick="addRow()">Add Labour</button>
<button onclick="saveAttendance()">Save To Firebase</button>
<button onclick="searchAttendance()">Load Records</button>
</div>

<div class="card" id="results"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyCFf3iuHtLwSaNf5b8DsxeiaAAFd9_54d4",
 authDomain:"agr-ai-laber-report.firebaseapp.com",
 projectId:"agr-ai-laber-report",
 storageBucket:"agr-ai-laber-report.firebasestorage.app",
 messagingSenderId:"827574665549",
 appId:"1:827574665549:web:d85833413b17aba9d87704"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addRow = function(){
let row=document.getElementById('labourTable').insertRow();
row.innerHTML=`<td><input></td><td><input></td>
<td><select>
<option>Supervisor</option>
<option>Carpenter</option>
<option>Mason</option>
<option>Helper</option>
<option>Electrician</option>
</select></td>
<td><input type="checkbox" checked></td>`;
}

for(let i=0;i<3;i++) addRow();
document.getElementById('date').value=new Date().toISOString().split('T')[0];

window.saveAttendance = async function(){
const rows=document.querySelectorAll('#labourTable tr');
const labours=[];
for(let i=1;i<rows.length;i++){
labours.push({
id:rows[i].cells[0].querySelector('input').value,
name:rows[i].cells[1].querySelector('input').value,
category:rows[i].cells[2].querySelector('select').value,
status:rows[i].cells[3].querySelector('input').checked?'Present':'Absent'
});
}
await addDoc(collection(db,'attendance'),{
enteredBy:enteredBy.value,
project:project.value,
date:date.value,
labours
});
alert('Saved to Firebase');
}

window.searchAttendance = async function(){
const snap=await getDocs(collection(db,'attendance'));
let html='';
snap.forEach(doc=>{
const d=doc.data();
html += `<p><b>${d.project}</b> | ${d.date} | ${d.enteredBy}</p>`;
});
document.getElementById('results').innerHTML=html || 'No records';
}
</script>
<footer>AGR & CO</footer>
</body>
</html>
