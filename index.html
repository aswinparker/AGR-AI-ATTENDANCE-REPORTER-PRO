<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGR AI Labour Attendance Pro</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#0b2545;
color:#fff;
text-align:center;
padding:20px;
}

header h1{
color:#d4af37;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card,.section{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.section{
margin-top:20px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
box-sizing:border-box;
}

button{
background:#0b2545;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#0b2545;
color:white;
}

footer{
background:#0b2545;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>AGR AI Labour Attendance Pro</h1>
<p>AGR & CO AI Construction Solutions</p>
</header>

<div class="container">

<div class="dashboard">

<div class="card">
<h2 id="presentCount">0</h2>
<p>Present</p>
</div>

<div class="card">
<h2 id="absentCount">0</h2>
<p>Absent</p>
</div>

<div class="card">
<h2 id="totalCount">0</h2>
<p>Total Labour</p>
</div>

<div class="card">
<h2 id="attendancePercent">0%</h2>
<p>Attendance %</p>
</div>

</div>

<div class="section">
<h3>Project Details</h3>

<input id="enteredBy" placeholder="Entered By">

<input id="project" placeholder="Project Name">

<input type="date" id="date">
</div>

<div class="section">
<h3>Labour Attendance</h3>

<table id="labourTable">
<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Present</th>
<th>Delete</th>
</tr>
</table>

<button onclick="addRow()">+ Add Labour</button>
</div>

<div class="section">
<button onclick="generateReport()">Generate Report</button>
<button onclick="saveAttendance()">Save Attendance</button>
<button onclick="generateMonthlyReport()">Monthly Summary</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="printReport()">Print</button>
</div>

<div class="section">
<h3>Daily Report</h3>
<div id="report"></div>
</div>

<div class="section">
<h3>Search Saved Records</h3>

<input type="date" id="searchDate">

<button onclick="searchRecords()">
Search Records
</button>

<div id="savedRecords"></div>
</div>

<div class="section">
<h3>Monthly Summary</h3>
<div id="monthlyReport"></div>
</div>

</div>

<footer>
AGR & CO AI Construction Solutions
</footer>

<script>

date.value=new Date().toISOString().split('T')[0];

function addRow(){

let row=labourTable.insertRow();

row.innerHTML=`
<td><input placeholder="ID"></td>

<td><input placeholder="Labour Name"></td>

<td>
<select>
<option>Supervisor</option>
<option>Site Engineer</option>
<option>Safety Officer</option>
<option>Mason</option>
<option>Helper</option>
<option>Bar Bender</option>
<option>Carpenter</option>
<option>Welder</option>
<option>Fitter</option>
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>Scaffolder</option>
<option>Operator</option>
<option>Driver</option>
</select>
</td>

<td style="text-align:center">
<input type="checkbox" checked>
</td>

<td>
<button onclick="this.closest('tr').remove()">X</button>
</td>
`;
}

for(let i=0;i<3;i++) addRow();
