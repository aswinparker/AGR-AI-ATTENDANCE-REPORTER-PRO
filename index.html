<!-- Project Details -->
<div class="section">
<h3>Project Details</h3>

<input id="enteredBy" placeholder="Entered By">

<input id="project" placeholder="Project Name">

<input id="date" type="date">
</div>

<!-- Search Records -->
<div class="section">
<h3>Search Saved Records</h3>

<input type="date" id="searchDate">

<button onclick="searchRecords()">Search</button>

<div id="savedRecords"></div>
</div>

<script>

function saveAttendance(){

generateReport();

const rows=document.querySelectorAll('#labourTable tr');

let labours=[];

for(let i=1;i<rows.length;i++){

const labour={
id:rows[i].cells[0].querySelector('input').value,
name:rows[i].cells[1].querySelector('input').value,
category:rows[i].cells[2].querySelector('select').value,
status:rows[i].cells[3].querySelector('input').checked
?'Present':'Absent'
};

labours.push(labour);

}

let records=
JSON.parse(
localStorage.getItem('AGR_LABOUR_RECORDS')
||'[]'
);

records.push({

enteredBy:enteredBy.value,
project:project.value,
date:date.value,
labours:labours

});

localStorage.setItem(
'AGR_LABOUR_RECORDS',
JSON.stringify(records)
);

alert('Attendance Saved Successfully');

}

function searchRecords(){

let date=searchDate.value;

let records=
JSON.parse(
localStorage.getItem('AGR_LABOUR_RECORDS')
||'[]'
);

let html='';

records
.filter(r=>r.date===date)
.forEach(r=>{

html+=`
<div style="margin-bottom:20px">

<h4>Project: ${r.project}</h4>

<p>
<b>Entered By:</b>
${r.enteredBy}
</p>

<p>
<b>Date:</b>
${r.date}
</p>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Status</th>
</tr>
`;

r.labours.forEach(l=>{

html+=`
<tr>
<td>${l.id}</td>
<td>${l.name}</td>
<td>${l.category}</td>
<td>${l.status}</td>
</tr>
`;

});

html+=`
</table>
</div>
`;

});

savedRecords.innerHTML=
html || 'No Records Found';

}

</script>
