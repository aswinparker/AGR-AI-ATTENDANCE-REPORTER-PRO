<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGR AI Workforce Suite - Workers</title><style>
:root{
 --blue:#0b2545;
 --gold:#d4af37;
 --bg:#f4f6f9;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 background:var(--bg);
}

header{
 background:var(--blue);
 color:white;
 text-align:center;
 padding:15px;
}

header h1{
 color:var(--gold);
}

.container{
 max-width:1200px;
 margin:auto;
 padding:20px;
}

.card{
 background:white;
 padding:15px;
 border-radius:10px;
 margin-bottom:15px;
 box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:1px solid #ddd;
 border-radius:6px;
}

button{
 background:var(--blue);
 color:white;
 border:none;
 cursor:pointer;
}

button:hover{
 opacity:.9;
}

.deleteBtn{
 background:#c62828;
}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:10px;
}

th,td{
 border:1px solid #ddd;
 padding:8px;
 text-align:left;
}

th{
 background:var(--blue);
 color:white;
}

footer{
 background:var(--blue);
 color:white;
 text-align:center;
 padding:10px;
 margin-top:20px;
}

@media(max-width:768px){
 table{
  font-size:12px;
 }
}
</style></head><body><header>
 <h1>AGR AI Workforce Suite</h1>
 <p>Workers Management - AGR & CO</p>
</header><div class="container"> <div class="card">
  <h2>Add Worker</h2>  <input id="workerId" placeholder="Worker ID">  <input id="workerName" placeholder="Worker Name">  <input id="workerMobile" placeholder="Mobile Number">  <select id="workerCategory">
   <option>Supervisor</option>
   <option>Mason</option>
   <option>Carpenter</option>
   <option>Helper</option>
   <option>Electrician</option>
   <option>Plumber</option>
   <option>Welder</option>
   <option>Painter</option>
  </select>  <select id="workerStatus">
   <option>Active</option>
   <option>Inactive</option>
  </select><button onclick="saveWorker()">Save Worker</button>

 </div> <div class="card"><input
id="searchBox"
placeholder="Search Worker..."
onkeyup="filterWorkers()">

  <table>
   <thead>
    <tr>
     <th>ID</th>
     <th>Name</th>
     <th>Mobile</th>
     <th>Category</th>
     <th>Status</th>
     <th>Action</th>
    </tr>
   </thead>   <tbody id="workersTableBody"></tbody>  </table> </div></div><footer>
 AGR & CO © 2026
</footer><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
 getFirestore,
 collection,
 addDoc,
 getDocs,
 deleteDoc,
 doc
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {

 apiKey:"YOUR_API_KEY",

 authDomain:"agr-ai-laber-report.firebaseapp.com",

 projectId:"agr-ai-laber-report",

 storageBucket:"agr-ai-laber-report.firebasestorage.app",

 messagingSenderId:"YOUR_SENDER_ID",

 appId:"YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveWorker = async function(){

 const workerId =
 document.getElementById("workerId").value.trim();

 const workerName =
 document.getElementById("workerName").value.trim();

 const workerMobile =
 document.getElementById("workerMobile").value.trim();

 const workerCategory =
 document.getElementById("workerCategory").value;

 const workerStatus =
 document.getElementById("workerStatus").value;

 if(!workerId || !workerName){
  alert("Please enter Worker ID and Name");
  return;
 }

 await addDoc(collection(db,"workers"),{

  workerId,
  name:workerName,
  mobile:workerMobile,
  category:workerCategory,
  status:workerStatus,
  createdAt:new Date().toISOString()

 });

 alert("Worker Saved Successfully");

 document.getElementById("workerId").value="";
 document.getElementById("workerName").value="";
 document.getElementById("workerMobile").value="";

 loadWorkers();
};

async function loadWorkers(){

 const tbody =
 document.getElementById("workersTableBody");

 tbody.innerHTML="";

 const snap =
 await getDocs(collection(db,"workers"));

 snap.forEach((workerDoc)=>{

  const worker = workerDoc.data();

  tbody.innerHTML += `
   <tr>
    <td>${worker.workerId}</td>
    <td>${worker.name}</td>
    <td>${worker.mobile || ''}</td>
    <td>${worker.category}</td>
    <td>${worker.status}</td>
    <td>
     <button
      class="deleteBtn"
      onclick="deleteWorker('${workerDoc.id}')">
      Delete
     </button>
    </td>
   </tr>
  `;
 });

}

window.deleteWorker = async function(id){

 if(!confirm("Delete worker?")) return;

 await deleteDoc(doc(db,"workers",id));

 loadWorkers();

};

window.filterWorkers = function(){

 const value =
 document.getElementById("searchBox")
 .value.toLowerCase();

 const rows =
 document.querySelectorAll("#workersTableBody tr");

 rows.forEach(row=>{

  row.style.display =
  row.innerText.toLowerCase().includes(value)
  ? ""
  : "none";

 });

};

loadWorkers();

</script></body>
</html>
